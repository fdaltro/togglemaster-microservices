name: CI - Build and Push to ECR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Microservices
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Gera a tag baseada no hash curto do commit para rastreabilidade
          VERSION="v1.0.0-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Utilizando a versão: $VERSION"

          # Lista das pastas conforme aparecem no seu repositório
          SERVICES=("auth" "flag" "targeting" "evaluation" "analytics")
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "------------------------------------------------"
            echo "Iniciando build do serviço: $SERVICE"
            
            # Nome do repositório definido no Terraform
            REPO_NAME="togglemaster-$SERVICE"
            
            # Build utilizando apenas a tag de versão para respeitar a imutabilidade
            docker build -t $ECR_REGISTRY/$REPO_NAME:$VERSION ./$SERVICE-service-main
            
            # Push para o ECR
            docker push $ECR_REGISTRY/$REPO_NAME:$VERSION
            
            echo "Serviço $SERVICE enviado com sucesso com a tag $VERSION"
          done