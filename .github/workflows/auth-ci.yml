name: CI Auth Service

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Job 1: Linter / Análise Estática
  linter:
    name: Linter & Static Analysis (Auth)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-tracking-file: auth-service-main/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: auth-service-main
          # Ignora erro de build se o linter encontrar apenas avisos simples
          args: --timeout=5m

  # Job 2: Build & Unit Test
  build-test:
    name: Build & Unit Test (Auth)
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-tracking-file: auth-service-main/go.sum

      - name: Install dependencies
        run: |
          cd auth-service-main
          go mod download

      - name: Run Unit Tests
        run: |
          cd auth-service-main
          # Executa todos os testes recursivamente e exibe cobertura básica
          go test -v ./...

      - name: Build Check
        run: |
          cd auth-service-main
          # Tenta compilar o binário para garantir que não há erros de tipagem ou imports
          go build -v -o auth-service .