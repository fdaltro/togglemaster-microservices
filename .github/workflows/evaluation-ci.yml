name: CI Evaluation Service

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Job 1: Linter / Análise Estática
  linter:
    name: Linter & Static Analysis (Evaluation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-tracking-file: evaluation-service-main/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: evaluation-service-main
          args: --timeout=5m

  # Job 2: Build & Unit Test
  build-test:
    name: Build & Unit Test (Evaluation)
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-tracking-file: evaluation-service-main/go.sum

      - name: Install dependencies
        run: |
          cd evaluation-service-main
          go mod download

      - name: Run Unit Tests
        run: |
          cd evaluation-service-main
          go test -v ./...

      - name: Build Check
        run: |
          cd evaluation-service-main
          go build -v -o evaluation-service .