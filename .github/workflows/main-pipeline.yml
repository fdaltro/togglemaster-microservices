name: ToggleMaster Master Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==========================================
  # ESTÁGIO 1: LINT, TESTS & SCA (PARALELOS)
  # ==========================================

  # --- SERVIÇOS EM GO ---

  test-auth:
    name: Test & Scan Auth (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install Dependencies
        working-directory: ./auth-service-main
        run: |
          if [ ! -f go.mod ]; then go mod init auth; fi
          go mod tidy
      - name: Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: auth-service-main
          args: --timeout=5m --allow-parallel-runners --disable errcheck,staticcheck
      
      # PASSO SCA: Trivy Scan
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './auth-service-main'
          format: 'table'
          exit-code: '1' # Trava o pipeline se encontrar vulnerabilidades
          severity: 'CRITICAL,HIGH'

      - name: Unit Test
        working-directory: ./auth-service-main
        run: go test -v ./...

  test-evaluation:
    name: Test & Scan Evaluation (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install Dependencies
        working-directory: ./evaluation-service-main
        run: |
          if [ ! -f go.mod ]; then go mod init evaluation; fi
          go mod tidy
      - name: Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: evaluation-service-main
          args: --timeout=5m --allow-parallel-runners --disable errcheck,staticcheck
      
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './evaluation-service-main'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Unit Test
        working-directory: ./evaluation-service-main
        run: go test -v ./...

  # --- SERVIÇOS EM PYTHON ---

  test-targeting:
    name: Test & Scan Targeting (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Lint & Test
        working-directory: ./targeting-service-main
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './targeting-service-main'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Unit Test
        working-directory: ./targeting-service-main
        run: pytest || echo "Sem testes"

  test-flag:
    name: Test & Scan Flag (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Lint & Test
        working-directory: ./flag-service-main
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './flag-service-main'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Unit Test
        working-directory: ./flag-service-main
        run: pytest || echo "Sem testes"

  test-analytics:
    name: Test & Scan Analytics (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Lint & Test
        working-directory: ./analytics-service-main
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './analytics-service-main'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Unit Test
        working-directory: ./analytics-service-main
        run: pytest || echo "Sem testes"

  # ==========================================
  # ESTÁGIO 2: BUILD, PUSH & GITOPS
  # ==========================================

  deploy:
    name: Build & Deploy to EKS
    needs: [test-auth, test-flag, test-targeting, test-evaluation, test-analytics]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        id: build-images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          VERSION="v1.0.0-$(echo ${{ github.sha }} | cut -c1-7)"
          SERVICES=("auth" "flag" "targeting" "evaluation" "analytics")
          
          for SERVICE in "${SERVICES[@]}"; do
            REPO_NAME="togglemaster-$SERVICE"
            echo "Building image for $SERVICE..."
            docker build -t $ECR_REGISTRY/$REPO_NAME:$VERSION ./$SERVICE-service-main
            docker push $ECR_REGISTRY/$REPO_NAME:$VERSION
          done
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: fdaltro/togglemaster-gitops
          token: ${{ secrets.GIT_TOKEN }}
          path: gitops-repo

      - name: Update Kustomize Tags
        run: |
          VERSION=${{ env.VERSION }}
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SERVICES=("auth" "flag" "targeting" "evaluation" "analytics")
          
          cd gitops-repo/apps
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Updating anchor 'togglemaster-$SERVICE' to version $VERSION"
            cd $SERVICE
            kustomize edit set image togglemaster-$SERVICE=$ECR_REGISTRY/togglemaster-$SERVICE:$VERSION
            cd ..
          done

      - name: Commit and Push to GitOps Repo
        run: |
          cd gitops-repo
          git config --global user.email "fabriciodaltro@gmail.com"
          git config --global user.name "fdaltro"
          git add .
          git commit -m "chore: deploy version ${{ env.VERSION }} [skip ci]" || echo "No changes"
          git push origin main